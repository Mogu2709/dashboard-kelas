{% extends 'base.html' %}

{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 48px);padding:40px 20px;text-align:center;">

    <div style="max-width:420px;width:100%;">

        <!-- Icon -->
        <div style="font-size:56px;margin-bottom:16px;line-height:1;">⚙️</div>

        <!-- Code -->
        <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--text-tertiary);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">Error 500</div>

        <!-- Title -->
        <h1 style="font-family:'Lora',Georgia,serif;font-size:26px;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.3;">
            Terjadi Kesalahan Server
        </h1>

        <!-- Desc -->
        <p style="font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:28px;">
            Ada sesuatu yang tidak beres di sisi server.<br>
            Coba muat ulang halaman atau kembali ke beranda.
        </p>

        <!-- Divider -->
        <div style="height:1px;background:var(--border);margin-bottom:28px;"></div>

        <!-- Actions -->
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
            <a href="/" class="btn btn-primary">🏠 Kembali ke Beranda</a>
            <a href="javascript:location.reload()" class="btn btn-secondary">🔄 Muat Ulang</a>
        </div>

    </div>

</div>
{% endblock %}
