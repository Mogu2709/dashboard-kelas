{% extends 'base.html' %}

{% block content %}
<div class="page-header fade">
    <span class="page-emoji">📝</span>
    <h1 class="page-title">Buat Pengumuman</h1>
    <p class="page-subtitle">Pengumuman akan dikirim ke semua mahasiswa</p>
</div>

<div class="page-content">
<div style="max-width:600px;" class="fade fade-1">
<div class="notion-card" style="padding:28px;">
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- Judul -->
    <div style="margin-bottom:20px;">
        <label style="display:block;font-size:12.5px;font-weight:500;color:#6b6b6b;margin-bottom:6px;">Judul</label>
        <input type="text" name="judul" placeholder="Judul pengumuman..."
            style="width:100%;border:1px solid #e9e9e7;border-radius:6px;padding:9px 12px;font-size:14px;color:#1a1a1a;outline:none;font-family:'Geist',sans-serif;box-sizing:border-box;"
            onfocus="this.style.borderColor='#1a1a1a';this.style.boxShadow='0 0 0 2px rgba(26,26,26,0.08)'"
            onblur="this.style.borderColor='#e9e9e7';this.style.boxShadow='none'">
    </div>

    <!-- Isi -->
    <div style="margin-bottom:20px;">
        <label style="display:block;font-size:12.5px;font-weight:500;color:#6b6b6b;margin-bottom:6px;">Isi Pengumuman</label>
        <textarea name="isi" rows="5" placeholder="Tulis isi pengumuman..."
            style="width:100%;border:1px solid #e9e9e7;border-radius:6px;padding:9px 12px;font-size:14px;color:#1a1a1a;outline:none;font-family:'Geist',sans-serif;resize:vertical;line-height:1.6;box-sizing:border-box;"
            onfocus="this.style.borderColor='#1a1a1a';this.style.boxShadow='0 0 0 2px rgba(26,26,26,0.08)'"
            onblur="this.style.borderColor='#e9e9e7';this.style.boxShadow='none'"></textarea>
    </div>

    <!-- Embed URL -->
    <div style="margin-bottom:20px;">
        <label style="display:block;font-size:12.5px;font-weight:500;color:#6b6b6b;margin-bottom:6px;">Link / YouTube URL <span style="color:#c4c4c0;font-weight:400;">(opsional)</span></label>
        <input type="url" name="embed_url" placeholder="https://youtube.com/watch?v=... atau link lainnya"
            style="width:100%;border:1px solid #e9e9e7;border-radius:6px;padding:9px 12px;font-size:14px;color:#1a1a1a;outline:none;font-family:'Geist',sans-serif;box-sizing:border-box;"
            onfocus="this.style.borderColor='#1a1a1a';this.style.boxShadow='0 0 0 2px rgba(26,26,26,0.08)'"
            onblur="this.style.borderColor='#e9e9e7';this.style.boxShadow='none'">
        <p style="font-size:12px;color:#c4c4c0;margin-top:4px;">Link YouTube akan otomatis di-embed sebagai video player</p>
    </div>

    <!-- File Upload -->
    <div style="margin-bottom:20px;">
        <label style="display:block;font-size:12.5px;font-weight:500;color:#6b6b6b;margin-bottom:6px;">Lampiran <span style="color:#c4c4c0;font-weight:400;">(foto, video, file — bisa lebih dari 1)</span></label>
        <div id="drop-zone" style="border:2px dashed #e9e9e7;border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all 0.15s;background:#fafaf8;"
             onclick="document.getElementById('file-input').click()"
             ondragover="handleDragOver(event)" ondrop="handleDrop(event)" ondragleave="handleDragLeave(event)">
            <div style="font-size:24px;margin-bottom:6px;">📎</div>
            <div style="font-size:13.5px;color:#6b6b6b;font-weight:500;">Klik atau drag & drop file di sini</div>
            <div style="font-size:12px;color:#c4c4c0;margin-top:4px;">Foto (JPG, PNG), Video (MP4), File (PDF, DOC, dll)</div>
        </div>
        <input type="file" id="file-input" name="attachments" multiple accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip"
               style="display:none;" onchange="previewFiles(this.files)">
        <div id="file-preview" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;"></div>
    </div>

    <!-- Prioritas + Pin -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
        <div>
            <label style="display:block;font-size:12.5px;font-weight:500;color:#6b6b6b;margin-bottom:6px;">Prioritas</label>
            <select name="prioritas" style="width:100%;border:1px solid #e9e9e7;border-radius:6px;padding:9px 12px;font-size:14px;color:#1a1a1a;background:white;outline:none;font-family:'Geist',sans-serif;cursor:pointer;">
                <option value="normal">🔘 Normal</option>
                <option value="penting">🟡 Penting</option>
                <option value="urgent">🔴 Urgent</option>
            </select>
        </div>
        <div>
            <label style="display:block;font-size:12.5px;font-weight:500;color:#6b6b6b;margin-bottom:6px;">Pin</label>
            <label style="display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid #e9e9e7;border-radius:6px;cursor:pointer;transition:background 0.1s;"
                   onmouseover="this.style.background='#f7f7f5'" onmouseout="this.style.background=''">
                <input type="checkbox" name="pinned" style="width:15px;height:15px;accent-color:#1a1a1a;cursor:pointer;">
                <span style="font-size:14px;color:#1a1a1a;">📌 Pin pengumuman</span>
            </label>
        </div>
    </div>

    <!-- Submit -->
    <div style="display:flex;gap:10px;padding-top:20px;border-top:1px solid #f7f7f5;">
        <button type="submit" class="btn btn-primary">Kirim Pengumuman</button>
        <a href="{% url 'pengumuman_list' %}" class="btn btn-secondary">Batal</a>
    </div>
</form>
</div>
</div>
</div>

<script>
function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('drop-zone').style.borderColor = '#1a1a1a';
    document.getElementById('drop-zone').style.background = '#f7f7f5';
}
function handleDragLeave(e) {
    document.getElementById('drop-zone').style.borderColor = '#e9e9e7';
    document.getElementById('drop-zone').style.background = '#fafaf8';
}
function handleDrop(e) {
    e.preventDefault();
    handleDragLeave(e);
    const input = document.getElementById('file-input');
    const dt = new DataTransfer();
    [...e.dataTransfer.files].forEach(f => dt.items.add(f));
    input.files = dt.files;
    previewFiles(input.files);
}

function previewFiles(files) {
    const preview = document.getElementById('file-preview');
    preview.innerHTML = '';
    [...files].forEach(f => {
        const ext = f.name.split('.').pop().toLowerCase();
        const isImg = ['jpg','jpeg','png','gif','webp'].includes(ext);
        const isVid = ['mp4','mov','avi','mkv','webm'].includes(ext);
        let html = '';
        if (isImg) {
            const url = URL.createObjectURL(f);
            html = `<div style="position:relative;"><img src="${url}" style="width:80px;height:60px;object-fit:cover;border-radius:6px;border:1px solid #e9e9e7;"><div style="font-size:10px;color:#9b9b9b;text-align:center;margin-top:2px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</div></div>`;
        } else {
            const icon = isVid ? '🎥' : '📄';
            html = `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><div style="padding:10px 14px;border:1px solid #e9e9e7;border-radius:6px;font-size:20px;background:#f7f7f5;">${icon}</div><div style="font-size:10px;color:#9b9b9b;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</div></div>`;
        }
        preview.insertAdjacentHTML('beforeend', html);
    });
}
</script>
{% endblock %}
