{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <span class="page-emoji">🗑️</span>
    <h1 class="page-title">Konfirmasi Hapus</h1>
    <p class="page-subtitle">Tindakan ini tidak dapat dibatalkan</p>
</div>

<div class="page-content">
    <div style="max-width:480px;" class="fade fade-1">
        <div class="notion-card" style="padding:28px;">
            <div style="text-align:center;margin-bottom:24px;">
                <div style="font-size:48px;margin-bottom:12px;">⚠️</div>
                <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;">
                    Hapus {{ tipe|title }}?
                </div>
                <div style="font-size:13.5px;color:var(--text-secondary);padding:0 16px;">
                    Kamu akan menghapus <strong>{{ obj }}</strong>. Semua data terkait juga akan dihapus dan tidak bisa dikembalikan.
                </div>
            </div>
            <div style="display:flex;gap:10px;justify-content:center;">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn" style="background:#e03e3e;color:white;box-shadow:0 1px 2px rgba(0,0,0,0.1);">
                        🗑️ Ya, Hapus
                    </button>
                </form>
                <a href="javascript:history.back()" class="btn btn-secondary">Batal</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
