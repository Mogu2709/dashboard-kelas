<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kelas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Geist', -apple-system, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Subtle grid background like Notion */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        .auth-wrap {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo-icon {
            width: 40px; height: 40px;
            background: #1a1a1a;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px;
            font-family: 'Lora', serif;
            font-size: 18px;
            font-weight: 600;
            color: white;
        }
        .auth-logo-name {
            font-family: 'Lora', Georgia, serif;
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .auth-card {
            background: #ffffff;
            border: 1px solid #e9e9e7;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
        }

        .auth-title {
            font-family: 'Lora', Georgia, serif;
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .auth-subtitle {
            font-size: 13px;
            color: #9b9b9b;
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 12.5px;
            font-weight: 500;
            color: #6b6b6b;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            border: 1px solid #e9e9e7;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            color: #1a1a1a;
            background: #fff;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            font-family: 'Geist', sans-serif;
        }
        .form-input:focus {
            border-color: #1a1a1a;
            box-shadow: 0 0 0 2px rgba(26,26,26,0.08);
        }
        .form-input::placeholder { color: #c4c4c0; }

        .form-error {
            font-size: 12px;
            color: #e03e3e;
            margin-top: 4px;
        }

        .auth-btn {
            width: 100%;
            padding: 9px 16px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            font-family: 'Geist', sans-serif;
            margin-top: 8px;
        }
        .auth-btn:hover { background: #333; }

        .auth-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #9b9b9b;
        }
        .auth-link a {
            color: #1a1a1a;
            font-weight: 500;
            text-decoration: none;
        }
        .auth-link a:hover { text-decoration: underline; }

        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            color: #b91c1c;
            margin-bottom: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-card { animation: fadeIn 0.3s ease forwards; }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-logo">
            <div class="auth-logo-icon">K</div>
            <div class="auth-logo-name">KelasKu</div>
        </div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
