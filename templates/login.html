{% extends 'auth_base.html' %}

{% block content %}
<div class="auth-card">
    <div class="auth-title">Masuk</div>
    <div class="auth-subtitle">Masukkan kredensial akunmu</div>

    {% if form.errors %}
    <div class="error-box">Username atau password salah. Coba lagi.</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-input" placeholder="username" autocomplete="username">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="auth-btn">Masuk →</button>
    </form>

    <div class="auth-link">
        Belum punya akun? <a href="{% url 'register' %}">Daftar</a>
    </div>
</div>
{% endblock %}
