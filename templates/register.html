{% extends 'auth_base.html' %}

{% block content %}
<div class="auth-card">
    <div class="auth-title">Buat Akun</div>
    <div class="auth-subtitle">Bergabung ke dashboard kelas</div>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label class="form-label">{{ field.label }}</label>
            <input
                type="{{ field.field.widget.input_type }}"
                name="{{ field.html_name }}"
                class="form-input"
                placeholder="{{ field.label }}"
                {% if field.value %}value="{{ field.value }}"{% endif %}
            >
            {% if field.errors %}
            <div class="form-error">{{ field.errors|join:", " }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="auth-btn">Buat Akun →</button>
    </form>

    <div class="auth-link">
        Sudah punya akun? <a href="{% url 'login' %}">Masuk</a>
    </div>
</div>
{% endblock %}
